name: agentbus

services:
  redis:
    image: ${AGENTBUS_REDIS_IMAGE:-redis:8.8.0-alpine}
    container_name: agentbus-redis
    restart: unless-stopped
    ports:
      - "${AGENTBUS_REDIS_BIND:-127.0.0.1}:${AGENTBUS_REDIS_PORT:-6389}:6379"
    volumes:
      - agentbus_redis:/data
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
      - --dir
      - /data
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "300"
      - "100"
      - --maxmemory-policy
      - noeviction

volumes:
  agentbus_redis:
